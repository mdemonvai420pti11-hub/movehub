<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎬 Movie Hub</title>

<script src='//libtl.com/sdk.js' data-zone='10805128' data-sdk='show_10805128'></script>

<style>
body{
    margin:0;
    background:linear-gradient(135deg,#141e30,#243b55);
    font-family:'Segoe UI',sans-serif;
    color:#fff;
}

.header{
    padding:15px;
    text-align:center;
    font-size:20px;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(8px);
    font-weight:bold;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
    padding:12px;
}

.card{
    background:rgba(255,255,255,0.05);
    border-radius:12px;
    overflow:hidden;
    backdrop-filter:blur(6px);
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.thumb{
    position:relative;
    height:140px;
}
.thumb img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.lock{
    position:absolute;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:18px;
}

.info{
    padding:10px;
}
.title{
    font-size:14px;
    font-weight:600;
}
.meta{
    font-size:12px;
    color:#ccc;
}

.btn{
    margin-top:8px;
    width:100%;
    padding:9px;
    border:none;
    border-radius:8px;
    background:linear-gradient(45deg,#ff416c,#ff4b2b);
    color:#fff;
    font-size:13px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">🎬 Movie Hub</div>
<div class="grid" id="app"></div>

<script>

const videos=[
{id:1,img:"1.jpg",title:"টেলিগ্রাম মুভি",channel:"https://t.me/+XK2-AtRmmeYwOTY1"},
{id:2,img:"2.jpg",title:"Bangla Dubbed",channel:"https://t.me/+XK2-AtRmmeYwOTY1"},
{id:3,img:"3.jpg",title:"Bongo TV",channel:"https://t.me/+XK2-AtRmmeYwOTY1"},
{id:4,img:"4.jpg",title:"Hollywood Movie",channel:"https://t.me/+XK2-AtRmmeYwOTY1"},
{id:5,img:"5.jpg",title:"Jio TV",channel:"https://t.me/+XK2-AtRmmeYwOTY1"},
{id:6,img:"6.jpg",title:"Hindi Movie",channel:"https://t.me/+XK2-AtRmmeYwOTY1"},
{id:7,img:"7.jpg",title:"কুরিয়ান ড্রামা",channel:"https://t.me/+XK2-AtRmmeYwOTY1"}
];

// ✅ SAVE SYSTEM
let ads = JSON.parse(localStorage.getItem("ads")||"{}");
let joined = JSON.parse(localStorage.getItem("joined")||"{}");

function views(){
    return Math.floor(Math.random()*500+50)+"K views";
}

function render(){
    const app=document.getElementById("app");

    app.innerHTML=videos.map(v=>{
        let c=ads[v.id]||0;
        let j=joined[v.id]||false;

        let locked = c<3 || !j;

        let btn="",action="";

        if(c<3){
            btn=`Unlock (${c}/3 ads)`;
            action=`watchAd(${v.id})`;
        }else if(!j){
            btn=`Join Channel`;
            action=`join(${v.id})`;
        }else{
            btn=`Watch Now`;
            action=`watch(${v.id})`;
        }

        return `
        <div class="card">
            <div class="thumb">
                <img src="${v.img}">
                ${locked?'<div class="lock">🔒</div>':''}
            </div>

            <div class="info">
                <div class="title">${v.title}</div>
                <div class="meta">${views()}</div>

                <button class="btn" onclick="${action}">${btn}</button>
            </div>
        </div>
        `;
    }).join("");
}

// ✅ Reward Ad
function watchAd(id){
    show_10805128().then(()=>{
        alert('You have seen an ad!');
        ads[id]=(ads[id]||0)+1;
        localStorage.setItem("ads", JSON.stringify(ads));
        render();
    });
}

// ✅ Join Channel
function join(id){
    window.open(videos.find(v=>v.id===id).channel);
    joined[id]=true;
    localStorage.setItem("joined", JSON.stringify(joined));
    render();
}

// ✅ FIXED WATCH (MAIN FIX)
function watch(id){
    window.open(videos.find(v=>v.id===id).channel);
}

render();

</script>

</body>
  </html>
